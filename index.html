<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ayan Token Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --cyan:#00e5ff;--teal:#00bcd4;--bg:#020a0e;
      --card:rgba(0,30,40,.82);--brd:rgba(0,229,255,.18);
      --dim:#5f8a96;--green:#39ff98;--red:#ff5e7a;
    }
    body{
      font-family:'Inter',sans-serif;background:var(--bg);
      min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
      padding:2rem 1rem;overflow-x:hidden;position:relative;
    }
    body::before{
      content:"";position:fixed;inset:0;
      background-image:linear-gradient(rgba(0,229,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.035) 1px,transparent 1px);
      background-size:38px 38px;z-index:0;animation:gs 25s linear infinite;
    }
    @keyframes gs{from{background-position:0 0}to{background-position:38px 38px}}
    .orb{position:fixed;border-radius:50%;z-index:0;pointer-events:none;}
    .orb1{width:420px;height:420px;background:radial-gradient(circle,rgba(0,200,220,.13) 0%,transparent 70%);top:-120px;right:-80px;animation:orbPulse 9s ease-in-out infinite alternate;}
    .orb2{width:300px;height:300px;background:radial-gradient(circle,rgba(0,120,180,.1) 0%,transparent 70%);bottom:-80px;left:-80px;animation:orbPulse 12s ease-in-out infinite alternate-reverse;}
    @keyframes orbPulse{from{transform:scale(1);opacity:.6}to{transform:scale(1.25);opacity:1}}
    .wrap{
      position:relative;z-index:2;width:100%;max-width:900px;
      background:rgba(2,14,20,.9);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
      border-radius:1.8rem;padding:2.5rem 2rem;border:1px solid var(--brd);
      box-shadow:0 0 0 1px rgba(0,229,255,.06),0 0 60px rgba(0,229,255,.08),0 40px 80px rgba(0,0,0,.85),inset 0 0 40px rgba(0,229,255,.025);
      animation:wrapIn .6s ease-out;
    }
    @keyframes wrapIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    /* Music Bar */
    .music-bar{
      display:none;align-items:center;justify-content:space-between;
      background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.18);
      border-radius:.8rem;padding:.55rem 1.1rem;margin-bottom:1.6rem;gap:.8rem;
    }
    .music-info{display:flex;align-items:center;gap:.6rem;color:var(--dim);font-size:.8rem;overflow:hidden;}
    .music-info i{color:var(--cyan);font-size:.85rem;flex-shrink:0;}
    .music-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#8ecfda;font-size:.78rem;}
    .music-eq{display:flex;align-items:flex-end;gap:2px;height:16px;flex-shrink:0;}
    .music-eq span{display:inline-block;width:3px;background:var(--cyan);border-radius:2px;animation:eq 0.8s ease-in-out infinite alternate;}
    .music-eq span:nth-child(1){height:6px;animation-delay:0s}
    .music-eq span:nth-child(2){height:12px;animation-delay:.15s}
    .music-eq span:nth-child(3){height:8px;animation-delay:.3s}
    .music-eq span:nth-child(4){height:14px;animation-delay:.1s}
    .music-eq span:nth-child(5){height:5px;animation-delay:.25s}
    .music-eq.paused span{animation-play-state:paused;opacity:.3}
    @keyframes eq{from{transform:scaleY(.4)}to{transform:scaleY(1)}}
    .music-toggle{
      background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.3);border-radius:.5rem;
      color:var(--cyan);padding:.35rem .75rem;cursor:pointer;transition:all .2s;flex-shrink:0;
      display:flex;align-items:center;gap:.4rem;
      font-family:'Rajdhani',sans-serif;font-weight:600;font-size:.8rem;letter-spacing:.5px;
    }
    .music-toggle:hover{background:rgba(0,229,255,.2);box-shadow:0 0 12px rgba(0,229,255,.3);}

    /* Header */
    .header{text-align:center;margin-bottom:2.5rem}
    .pic-wrap{display:flex;justify-content:center;margin-bottom:1.3rem}
    .pic-ring{
      width:110px;height:110px;border-radius:50%;border:3px solid var(--cyan);
      overflow:hidden;background:#001a20;display:flex;align-items:center;justify-content:center;
      position:relative;
      box-shadow:0 0 0 5px rgba(0,229,255,.1),0 0 25px rgba(0,229,255,.45),0 0 55px rgba(0,180,200,.25);
      animation:rp 3.5s ease-in-out infinite;
    }
    @keyframes rp{
      0%,100%{box-shadow:0 0 0 5px rgba(0,229,255,.1),0 0 25px rgba(0,229,255,.45),0 0 55px rgba(0,180,200,.25)}
      50%{box-shadow:0 0 0 9px rgba(0,229,255,.06),0 0 45px rgba(0,229,255,.65),0 0 80px rgba(0,200,220,.4)}
    }
    .pic-ring img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .pic-ring .fi{font-size:2.8rem;color:var(--cyan);opacity:.65}
    h1{
      font-family:'Rajdhani',sans-serif;font-size:2.7rem;font-weight:700;
      letter-spacing:3px;text-transform:uppercase;
      background:linear-gradient(90deg,#00e5ff 0%,#39ff98 50%,#00bcd4 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      margin-bottom:.35rem;animation:titleGlow 4s ease-in-out infinite alternate;
    }
    @keyframes titleGlow{from{filter:drop-shadow(0 0 8px rgba(0,229,255,.4))}to{filter:drop-shadow(0 0 18px rgba(57,255,152,.5))}}
    .sub{color:var(--dim);font-size:.88rem;display:flex;align-items:center;justify-content:center;gap:.5rem;flex-wrap:wrap;}
    .sub i{color:var(--cyan);font-size:.7rem}
    .bdg{background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.22);border-radius:20px;padding:.22rem 1rem;font-size:.75rem;color:var(--cyan);}

    /* Cards */
    .grid{display:flex;flex-direction:column;gap:1.5rem;margin:1.8rem 0}
    .card{
      background:var(--card);border:1px solid var(--brd);border-radius:1.3rem;
      padding:1.6rem 1.7rem;box-shadow:0 8px 32px rgba(0,0,0,.55);
      transition:border-color .3s,box-shadow .3s,transform .3s;position:relative;overflow:hidden;
    }
    .card::before{content:"";position:absolute;top:0;left:-100%;width:60%;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0;transition:opacity .3s;}
    .card:hover{border-color:rgba(0,229,255,.45);box-shadow:0 0 30px rgba(0,229,255,.12),0 16px 40px rgba(0,180,200,.18);transform:translateY(-3px);}
    .card:hover::before{opacity:1;animation:shimmer 1.2s ease forwards}
    @keyframes shimmer{from{left:-60%}to{left:130%}}
    .card::after{content:"";position:absolute;top:12px;right:14px;width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan),0 0 16px var(--cyan);opacity:.5;animation:dot 2.5s ease-in-out infinite alternate;}
    @keyframes dot{from{opacity:.3;transform:scale(.8)}to{opacity:.8;transform:scale(1.2)}}
    .ch{display:flex;align-items:center;gap:.75rem;margin-bottom:1.3rem;flex-wrap:wrap;}
    .ch i{font-size:1.55rem;color:var(--cyan);filter:drop-shadow(0 0 7px rgba(0,229,255,.7));}
    .card-pic{
      width:46px;height:46px;border-radius:50%;border:2px solid var(--cyan);
      overflow:hidden;background:#001a20;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;box-shadow:0 0 12px rgba(0,229,255,.5),0 0 24px rgba(0,180,200,.2);
      animation:rp 3.5s ease-in-out infinite;
    }
    .card-pic img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .card-pic .cfi{font-size:1.3rem;color:var(--cyan);opacity:.7}
    .ch h2{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:1.25rem;color:#e0f7fa;letter-spacing:.8px;text-transform:uppercase;}
    .ep{background:rgba(0,229,255,.05);padding:.22rem .85rem;border-radius:20px;font-size:.7rem;color:var(--teal);margin-left:auto;font-family:monospace;border:1px solid rgba(0,229,255,.18);}

    /* Tabs */
    .method-tabs{display:flex;gap:.5rem;margin-bottom:1.1rem;flex-wrap:wrap;}
    .mtab{
      flex:1;min-width:80px;background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.2);
      border-radius:.55rem;padding:.5rem .8rem;color:var(--dim);font-size:.8rem;cursor:pointer;
      text-align:center;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:all .2s;
    }
    .mtab.active,.mtab:hover{background:rgba(0,229,255,.12);border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 12px rgba(0,229,255,.2);}
    .mtab.active{background:rgba(0,229,255,.15);box-shadow:0 0 18px rgba(0,229,255,.3),inset 0 0 10px rgba(0,229,255,.07);}
    .method-fields{display:none}
    .method-fields.active{display:flex;flex-direction:column;gap:.7rem;margin-bottom:1rem}

    /* Inputs */
    input{
      width:100%;background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.15);
      border-radius:.6rem;padding:.78rem 1.1rem;font-size:.9rem;color:#c8f0f5;
      outline:none;font-family:'Inter',sans-serif;transition:border-color .2s,box-shadow .2s,background .2s;
    }
    input:focus{border-color:var(--cyan);box-shadow:0 0 18px rgba(0,229,255,.22);background:rgba(0,229,255,.07);}
    input::placeholder{color:var(--dim);font-weight:300}

    /* Buttons */
    .btn-row{display:flex;flex-wrap:wrap;gap:.7rem;margin-top:.3rem}
    .btn{
      background:linear-gradient(135deg,#006978,#00bcd4);border:none;border-radius:.65rem;
      padding:.8rem 1.8rem;font-weight:700;color:#001a20;
      display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
      cursor:pointer;transition:all .25s;
      box-shadow:0 4px 18px rgba(0,180,200,.4),0 0 0 1px rgba(0,229,255,.15);
      white-space:nowrap;font-family:'Rajdhani',sans-serif;font-size:.95rem;letter-spacing:.8px;text-transform:uppercase;
      position:relative;overflow:hidden;
    }
    .btn::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);opacity:0;transition:opacity .2s;}
    .btn:hover::after{opacity:1}
    .btn:hover{background:linear-gradient(135deg,#00bcd4,#39ff98);box-shadow:0 6px 25px rgba(0,229,255,.55),0 0 0 1px rgba(57,255,152,.3);transform:scale(1.03);color:#001520;}
    .btn:active{transform:scale(.97)}

    /* Response */
    .res{
      margin-top:1.1rem;background:#010e12;border-radius:.8rem;padding:1rem 1.2rem;
      font-family:'Courier New',Courier,monospace;font-size:.82rem;color:var(--green);
      border:1px solid rgba(0,229,255,.14);word-break:break-all;min-height:90px;max-height:200px;
      overflow-y:auto;white-space:pre-wrap;line-height:1.55;
      box-shadow:inset 0 0 20px rgba(0,0,0,.6),0 0 12px rgba(0,229,255,.05);transition:border-color .3s;
    }
    .res:hover{border-color:rgba(0,229,255,.3)}
    .res.loading::after{content:"▌";animation:blink .7s step-end infinite;color:var(--cyan);}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

    /* Footer */
    hr{border:none;border-top:1px solid rgba(0,229,255,.08);margin:1.8rem 0 1rem}
    .foot{text-align:center;color:var(--dim);font-size:.82rem;display:flex;justify-content:center;align-items:center;gap:.5rem;flex-wrap:wrap;}
    .foot i{color:var(--cyan);font-size:.7rem}

    @media(max-width:600px){.wrap{padding:1.6rem 1rem}h1{font-size:2rem}.btn{padding:.7rem 1.2rem;font-size:.88rem}}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(0,229,255,.3);border-radius:3px}
  </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- Background Music (autoplay) -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="wrap">

  <!-- Music Bar -->
  <div class="music-bar" id="musicBar">
    <div class="music-info">
      <i class="fas fa-music"></i>
      <div class="music-eq" id="musicEq">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <span class="music-title">♪ Now Playing</span>
    </div>
    <button class="music-toggle" id="musicToggle">
      <i class="fas fa-pause" id="musicIcon"></i>
      <span id="musicLabel">PAUSE</span>
    </button>
  </div>

  <div class="header">
    <div class="pic-wrap">
      <div class="pic-ring">
        <i class="fas fa-user fi" id="fi"></i>
        <img id="pi" src="pic.jpg" alt="Ayan" style="display:none" onerror="this.style.display='none';document.getElementById('fi').style.display='block'">
      </div>
    </div>
    <h1>Ayan Token Hub</h1>
    <div class="sub">
      <i class="fas fa-bolt"></i> by Ayan
      <span class="bdg"><i class="fas fa-code"></i> ayan_offcial</span>
    </div>
  </div>

  <div class="grid">

    <!-- BIO CARD -->
    <div class="card">
      <div class="ch">
        <div class="card-pic">
          <i class="fas fa-align-left cfi" id="cfi1"></i>
          <img id="cpi1" src="pic1.jpeg" alt="Ayan" style="display:none"
            onerror="this.style.display='none';document.getElementById('cfi1').style.display='flex'">
        </div>
        <h2>Update Bio</h2>
        <span class="ep">bio endpoint</span>
      </div>
      <div class="method-tabs">
        <div class="mtab active" data-card="bio" data-method="guest">Guest UID</div>
        <div class="mtab" data-card="bio" data-method="jwt">JWT Token</div>
        <div class="mtab" data-card="bio" data-method="access">Access Token</div>
      </div>
      <div class="method-fields active" id="bio-guest">
        <input id="bio-uid" placeholder="UID">
        <input id="bio-pass" placeholder="Password" type="password">
      </div>
      <div class="method-fields" id="bio-jwt">
        <input id="bio-jwt-val" placeholder="JWT Token">
      </div>
      <div class="method-fields" id="bio-access">
        <input id="bio-access-val" placeholder="Access Token">
      </div>
      <input id="bio-text" placeholder="Bio text..." style="margin-bottom:.8rem">
      <div class="btn-row">
        <button class="btn" id="bioBtn"><i class="fas fa-align-left"></i> Update Bio</button>
      </div>
      <div id="bioStatus" style="display:none;margin-top:1.1rem;border-radius:1rem;overflow:hidden;border:1px solid rgba(0,229,255,.2);box-shadow:0 0 30px rgba(0,229,255,.08)">
        <div id="bioStatusBar" style="padding:.6rem 1.2rem;display:flex;align-items:center;gap:.6rem;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:1px">
          <span id="bioStatusIcon" style="font-size:1.1rem"></span>
          <span id="bioStatusTitle"></span>
          <span id="bioStatusSpin" style="margin-left:auto;display:none"><i class="fas fa-spinner fa-spin"></i></span>
        </div>
        <div style="background:#010e12;padding:1rem 1.2rem;border-top:1px solid rgba(0,229,255,.1)">
          <div id="bioStatusMsg" style="font-family:'Courier New',monospace;font-size:.83rem;line-height:1.6;word-break:break-all;white-space:pre-wrap"></div>
        </div>
      </div>
    </div>

    <!-- FRIEND MANAGER CARD -->
    <div class="card">
      <div class="ch">
        <div class="card-pic">
          <i class="fas fa-user-friends cfi" id="cfi2"></i>
          <img id="cpi2" src="pic2.jpeg" alt="Ayan" style="display:none"
            onerror="this.style.display='none';document.getElementById('cfi2').style.display='flex'">
        </div>
        <h2>Friend Manager</h2>
        <span class="ep">friend endpoint</span>
      </div>
      <div class="method-tabs">
        <div class="mtab active" data-card="fr" data-method="guest">Guest UID</div>
        <div class="mtab" data-card="fr" data-method="jwt">JWT Token</div>
        <div class="mtab" data-card="fr" data-method="access">Access Token</div>
      </div>
      <div class="method-fields active" id="fr-guest">
        <input id="fr-uid" placeholder="Your UID">
        <input id="fr-pass" placeholder="Password" type="password">
      </div>
      <div class="method-fields" id="fr-jwt">
        <input id="fr-jwt-val" placeholder="JWT Token">
      </div>
      <div class="method-fields" id="fr-access">
        <input id="fr-access-val" placeholder="Access Token">
      </div>
      <input id="fr-pid" placeholder="Friend UID" style="margin-bottom:.8rem">
      <div class="btn-row">
        <button class="btn" id="addBtn"><i class="fas fa-user-plus"></i> Add</button>
        <button class="btn" id="remBtn" style="background:linear-gradient(135deg,#7a0030,#d40055);box-shadow:0 4px 18px rgba(200,0,80,.4)"><i class="fas fa-user-minus"></i> Remove</button>
        <button class="btn" id="listBtn" style="background:linear-gradient(135deg,#004d6e,#0097b2);box-shadow:0 4px 18px rgba(0,150,180,.4)"><i class="fas fa-list"></i> Friend List</button>
      </div>
      <div id="frStatus" style="display:none;margin-top:1.1rem;border-radius:1rem;overflow:hidden;border:1px solid rgba(0,229,255,.2);box-shadow:0 0 30px rgba(0,229,255,.08)">
        <div id="frStatusBar" style="padding:.6rem 1.2rem;display:flex;align-items:center;gap:.6rem;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:1px">
          <span id="frStatusIcon" style="font-size:1.1rem"></span>
          <span id="frStatusTitle"></span>
          <span id="frStatusSpin" style="margin-left:auto;display:none"><i class="fas fa-spinner fa-spin"></i></span>
        </div>
        <div style="background:#010e12;padding:1rem 1.2rem;border-top:1px solid rgba(0,229,255,.1)">
          <div id="frStatusMsg" style="font-family:'Courier New',monospace;font-size:.83rem;line-height:1.6;word-break:break-all;white-space:pre-wrap"></div>
        </div>
      </div>
      <!-- Friend List Table -->
      <div id="flWrap" style="display:none;margin-top:1.1rem">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem">
          <span style="color:var(--cyan);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1rem;letter-spacing:1px">
            <i class="fas fa-users"></i> FRIEND LIST <span id="flCount" style="font-size:.8rem;color:var(--dim)"></span>
          </span>
          <button onclick="document.getElementById('flWrap').style.display='none'" style="background:transparent;border:1px solid rgba(0,229,255,.2);border-radius:.4rem;color:var(--dim);padding:.2rem .7rem;cursor:pointer;font-size:.75rem">✕</button>
        </div>
        <div style="overflow-x:auto;border-radius:.8rem;border:1px solid rgba(0,229,255,.15)">
          <table style="width:100%;border-collapse:collapse;font-size:.82rem">
            <thead>
              <tr style="background:rgba(0,229,255,.08);border-bottom:1px solid rgba(0,229,255,.2)">
                <th style="padding:.6rem .9rem;color:var(--cyan);font-family:'Rajdhani',sans-serif;letter-spacing:1px;text-align:left">#</th>
                <th style="padding:.6rem .9rem;color:var(--cyan);font-family:'Rajdhani',sans-serif;letter-spacing:1px;text-align:left">UID</th>
                <th style="padding:.6rem .9rem;color:var(--cyan);font-family:'Rajdhani',sans-serif;letter-spacing:1px;text-align:left">NAME</th>
              </tr>
            </thead>
            <tbody id="flBody"></tbody>
          </table>
        </div>
        <div id="flEmpty" style="display:none;text-align:center;padding:1.5rem;color:var(--dim);font-size:.85rem">
          <i class="fas fa-user-slash" style="font-size:1.5rem;margin-bottom:.5rem;display:block;opacity:.4"></i>No friends found
        </div>
      </div>
    </div>

    <!-- USER INFO CARD -->
    <div class="card">
      <div class="ch">
        <div class="card-pic">
          <i class="fas fa-info-circle cfi" id="cfi3"></i>
          <img id="cpi3" src="pic3.jpeg" alt="Ayan" style="display:none"
            onerror="this.style.display='none';document.getElementById('cfi3').style.display='flex'">
        </div>
        <h2>User Info</h2>
        <span class="ep">info endpoint</span>
      </div>
      <input id="iUid" placeholder="UID (e.g., 7468694883)" style="margin-bottom:.8rem">
      <div class="btn-row">
        <button class="btn" id="infoBtn"><i class="fas fa-search"></i> Fetch Info</button>
      </div>
      <div id="infoStatus" style="display:none;margin-top:1.1rem;border-radius:1rem;overflow:hidden;border:1px solid rgba(0,229,255,.2);box-shadow:0 0 30px rgba(0,229,255,.08)">
        <div id="infoStatusBar" style="padding:.6rem 1.2rem;display:flex;align-items:center;gap:.6rem;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:1px">
          <span id="infoStatusIcon" style="font-size:1.1rem"></span>
          <span id="infoStatusTitle"></span>
          <span id="infoStatusSpin" style="margin-left:auto;display:none"><i class="fas fa-spinner fa-spin"></i></span>
        </div>
        <div style="background:#010e12;padding:1rem 1.2rem;border-top:1px solid rgba(0,229,255,.1)">
          <div id="infoStatusMsg" style="font-family:'Courier New',monospace;font-size:.83rem;line-height:1.6;word-break:break-all;white-space:pre-wrap"></div>
        </div>
      </div>
    </div>

  </div>

  <hr>
  <div class="foot">
    <i class="fas fa-bolt"></i> Crafted by Ayan <i class="fas fa-bolt"></i>
    <span style="opacity:.5;margin-left:.3rem">ayan_offcial</span>
  </div>
</div>

<script>
(function(){

  /* ── Profile pic (header) ── */
  var pi = document.getElementById("pi");
  pi.onload = function(){ pi.style.display="block"; document.getElementById("fi").style.display="none"; };

  /* ── Card pics ── */
  [1,2,3].forEach(function(n){
    var img = document.getElementById("cpi"+n);
    img.onload = function(){ img.style.display="block"; document.getElementById("cfi"+n).style.display="none"; };
  });

  /* ── Background Music ── */
  var audio = document.getElementById("bgMusic");
  var musicPlaying = false;
  var bar = document.getElementById("musicBar");
  bar.style.display = "flex";

  function updateUI(){
    document.getElementById("musicIcon").className = musicPlaying ? "fas fa-pause" : "fas fa-play";
    document.getElementById("musicLabel").textContent = musicPlaying ? "PAUSE" : "PLAY";
    var eq = document.getElementById("musicEq");
    musicPlaying ? eq.classList.remove("paused") : eq.classList.add("paused");
  }

  function doPlay(){
    audio.play().then(function(){
      musicPlaying = true;
      updateUI();
    }).catch(function(){});
  }

  /* Try autoplay on load */
  doPlay();

  /* Fallback: play on first interaction */
  var interacted = false;
  function onInteract(){
    if(!interacted && !musicPlaying){
      interacted = true;
      doPlay();
    }
  }
  document.addEventListener("click", onInteract);
  document.addEventListener("touchstart", onInteract);

  /* Toggle button */
  document.getElementById("musicToggle").addEventListener("click", function(e){
    e.stopPropagation();
    e.preventDefault();
    if(musicPlaying){
      audio.pause();
      musicPlaying = false;
      updateUI();
    } else {
      doPlay();
    }
  });

  /* ── API URLs ── */
  var MAFU = "https://mafuuu-token-converter.onrender.com/mafu";
  var ADD  = "https://mahir-friend-web.vercel.app";
  var INFO = "https://mafuuuu-info-api.vercel.app/mafu-info";

  /* ── Helpers ── */
  function g(id){ return document.getElementById(id).value.trim(); }
  function R(id,txt,err){
    var el=document.getElementById(id);
    el.classList.remove("loading");
    el.textContent=txt;
    el.style.color=err?"#ff5e7a":"#39ff98";
  }
  async function call(url,id){
    url = "/api/proxy?url=" + encodeURIComponent(url);
    var el=document.getElementById(id);
    el.textContent="";el.classList.add("loading");el.style.color="#00e5ff";
    try{
      var r=await fetch(url);
      var t=await r.text();
      R(id,"["+r.status+"] "+t);
    }catch(e){R(id,"Error: "+e.message,true);}
  }

  /* ── Tab switching ── */
  document.querySelectorAll(".mtab").forEach(function(tab){
    tab.addEventListener("click",function(){
      var card=this.dataset.card, method=this.dataset.method;
      document.querySelectorAll('.mtab[data-card="'+card+'"]').forEach(function(t){t.classList.remove("active");});
      document.querySelectorAll('[id^="'+card+'-"]').forEach(function(f){
        if(f.classList.contains("method-fields"))f.classList.remove("active");
      });
      this.classList.add("active");
      document.getElementById(card+"-"+method).classList.add("active");
    });
  });

  /* ── Auth builder ── */
  function authParams(card){
    var method=document.querySelector('.mtab.active[data-card="'+card+'"]').dataset.method;
    if(method==="guest"){
      var uid=g(card+"-uid"),pass=g(card+"-pass");
      if(!uid||!pass)return null;
      return "uid="+encodeURIComponent(uid)+"&password="+encodeURIComponent(pass);
    }else if(method==="jwt"){
      var jwt=g(card+"-jwt-val");
      if(!jwt)return null;
      return "jwt_token="+encodeURIComponent(jwt);
    }else{
      var acc=g(card+"-access-val");
      if(!acc)return null;
      return "access_token="+encodeURIComponent(acc);
    }
  }

  /* ── Universal Premium Status Box ── */
  function showStatus(prefix, type, msg){
    var box=document.getElementById(prefix+"Status");
    var bar=document.getElementById(prefix+"StatusBar");
    var icon=document.getElementById(prefix+"StatusIcon");
    var title=document.getElementById(prefix+"StatusTitle");
    var spin=document.getElementById(prefix+"StatusSpin");
    var msgEl=document.getElementById(prefix+"StatusMsg");
    box.style.display="block";
    if(type==="loading"){
      spin.style.display="inline";
      bar.style.background="linear-gradient(90deg,rgba(0,100,140,.6),rgba(0,60,80,.6))";
      icon.innerHTML='<i class="fas fa-satellite-dish" style="color:#00e5ff"></i>';
      title.style.color="#00e5ff"; title.textContent="PROCESSING...";
      msgEl.style.color="#8ecfda"; msgEl.textContent=msg;
    } else if(type==="success"){
      spin.style.display="none";
      bar.style.background="linear-gradient(90deg,rgba(0,80,40,.7),rgba(0,50,25,.7))";
      icon.innerHTML='<i class="fas fa-check-circle" style="color:#39ff98"></i>';
      title.style.color="#39ff98"; title.textContent="SUCCESS";
      msgEl.style.color="#39ff98"; msgEl.textContent=msg;
    } else {
      spin.style.display="none";
      bar.style.background="linear-gradient(90deg,rgba(120,0,30,.7),rgba(80,0,20,.7))";
      icon.innerHTML='<i class="fas fa-times-circle" style="color:#ff5e7a"></i>';
      title.style.color="#ff5e7a"; title.textContent="FAILED";
      msgEl.style.color="#ff5e7a"; msgEl.textContent=msg;
    }
  }

  async function apiCall(url, prefix){
    showStatus(prefix,"loading","Sending request...");
    try{
      var r=await fetch("/api/proxy?url="+encodeURIComponent(url));
      var t=await r.text();
      if(r.status===200||t.toLowerCase().includes("success")||t.toLowerCase().includes("done")){
        showStatus(prefix,"success","["+r.status+"] "+t);
      } else {
        showStatus(prefix,"error","["+r.status+"] "+t);
      }
    }catch(e){showStatus(prefix,"error","Error: "+e.message);}
  }

  /* ── BIO ── */
  document.getElementById("bioBtn").onclick=function(){
    var bio=g("bio-text");
    if(!bio){showStatus("bio","error","Bio text missing!");return;}
    var auth=authParams("bio");
    if(!auth){showStatus("bio","error","Auth info missing!");return;}
    apiCall(MAFU+"?bio="+encodeURIComponent(bio)+"&"+auth,"bio");
  };

  async function frCall(url, action){
    frShow("loading","Sending "+action+" request...",true);
    try{
      var r=await fetch("/api/proxy?url="+encodeURIComponent(url));
      var t=await r.text();
      if(r.status===200||t.toLowerCase().includes("success")||t.toLowerCase().includes("done")){
        showStatus("fr","success","["+r.status+"] "+t);
      } else {
        showStatus("fr","error","["+r.status+"] "+t);
      }
    }catch(e){showStatus("fr","error","Error: "+e.message);}
  }

  /* ── ADD FRIEND ── */
  document.getElementById("addBtn").onclick=function(){
    var pid=g("fr-pid");
    if(!pid){showStatus("fr","error","Friend UID required!");return;}
    var uid=g("fr-uid"),pass=g("fr-pass");
    if(!uid||!pass){showStatus("fr","error","UID and Password required!");return;}
    document.getElementById("flWrap").style.display="none";
    frCall(ADD+"/add_friend?uid="+encodeURIComponent(uid)+"&password="+encodeURIComponent(pass)+"&friend_uid="+encodeURIComponent(pid),"ADD FRIEND");
  };

  /* ── REMOVE FRIEND ── */
  document.getElementById("remBtn").onclick=function(){
    var pid=g("fr-pid");
    if(!pid){showStatus("fr","error","Friend UID required!");return;}
    var uid=g("fr-uid"),pass=g("fr-pass");
    if(!uid||!pass){showStatus("fr","error","UID and Password required!");return;}
    document.getElementById("flWrap").style.display="none";
    frCall(ADD+"/remove_friend?uid="+encodeURIComponent(uid)+"&password="+encodeURIComponent(pass)+"&friend_uid="+encodeURIComponent(pid),"REMOVE FRIEND");
  };

  /* ── FRIEND LIST ── */
  document.getElementById("listBtn").onclick=function(){
    var uid=g("fr-uid"),pass=g("fr-pass");
    if(!uid||!pass){showStatus("fr","error","UID and Password required!");return;}
    document.getElementById("frStatus").style.display="none";
    var wrap=document.getElementById("flWrap");
    var body=document.getElementById("flBody");
    var empty=document.getElementById("flEmpty");
    var count=document.getElementById("flCount");
    wrap.style.display="block";
    empty.style.display="none";
    body.innerHTML='<tr><td colspan="3" style="text-align:center;padding:1.2rem;color:var(--cyan)"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>';
    fetch("/api/proxy?url="+encodeURIComponent(ADD+"/friend_list?uid="+encodeURIComponent(uid)+"&password="+encodeURIComponent(pass)+"&friend_uid="+encodeURIComponent(uid)))
    .then(function(r){return r.text();}).then(function(t){
      try{
        var data=JSON.parse(t);
        var list=data.friends||data.friend_list||data.data||data||[];
        if(!Array.isArray(list)||list.length===0){
          body.innerHTML="";empty.style.display="block";count.textContent="(0)";return;
        }
        count.textContent="("+list.length+")";
        body.innerHTML=list.map(function(f,i){
          var u=f.uid||f.account_id||f.id||"-";
          var n=f.name||f.nickname||f.playerName||"-";
          return '<tr style="border-bottom:1px solid rgba(0,229,255,.07)" onmouseover="this.style.background=\'rgba(0,229,255,.05)\'" onmouseout="this.style.background=\'transparent\'">'
            +'<td style="padding:.55rem .9rem;color:var(--dim)">'+(i+1)+'</td>'
            +'<td style="padding:.55rem .9rem;color:#8ecfda;font-family:monospace">'+u+'</td>'
            +'<td style="padding:.55rem .9rem;color:#e0f7fa"><i class="fas fa-user" style="color:var(--cyan);opacity:.5;font-size:.7rem;margin-right:.4rem"></i>'+n+'</td>'
            +'</tr>';
        }).join("");
      }catch(e){
        body.innerHTML='<tr><td colspan="3" style="padding:1rem;color:#ff5e7a;text-align:center">Parse error: '+t.substring(0,120)+'</td></tr>';
      }
    }).catch(function(e){
      body.innerHTML='<tr><td colspan="3" style="padding:1rem;color:#ff5e7a;text-align:center">Error: '+e.message+'</td></tr>';
    });
  };

  /* ── USER INFO ── */
  document.getElementById("infoBtn").onclick=function(){
    var uid=g("iUid");
    if(!uid){showStatus("info","error","Enter UID!");return;}
    apiCall(INFO+"?uid="+encodeURIComponent(uid),"info");
  };

})();
</script>
</body>
</html>
