<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ayan Token Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --cyan:#00e5ff;--teal:#00bcd4;--bg:#020a0e;
      --card:rgba(0,30,40,.82);--brd:rgba(0,229,255,.18);
      --dim:#5f8a96;--green:#39ff98;--red:#ff5e7a;
    }
    body{
      font-family:'Inter',sans-serif;background:var(--bg);
      min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
      padding:2rem 1rem;overflow-x:hidden;position:relative;
    }
    body::before{
      content:"";position:fixed;inset:0;
      background-image:linear-gradient(rgba(0,229,255,.035) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,229,255,.035) 1px,transparent 1px);
      background-size:38px 38px;z-index:0;animation:gs 25s linear infinite;
    }
    @keyframes gs{from{background-position:0 0}to{background-position:38px 38px}}
    .orb{position:fixed;border-radius:50%;z-index:0;pointer-events:none;}
    .orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(0,200,220,.15) 0%,transparent 70%);top:-150px;right:-100px;animation:orbPulse 9s ease-in-out infinite alternate;}
    .orb2{width:350px;height:350px;background:radial-gradient(circle,rgba(0,120,180,.12) 0%,transparent 70%);bottom:-100px;left:-100px;animation:orbPulse 12s ease-in-out infinite alternate-reverse;}
    .orb3{width:250px;height:250px;background:radial-gradient(circle,rgba(57,255,152,.06) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation:orbPulse 15s ease-in-out infinite alternate;}
    @keyframes orbPulse{from{transform:scale(1);opacity:.5}to{transform:scale(1.3);opacity:1}}
    .wrap{
      position:relative;z-index:2;width:100%;max-width:900px;
      background:rgba(2,14,20,.92);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
      border-radius:2rem;padding:2.5rem 2rem;border:1px solid var(--brd);
      box-shadow:0 0 0 1px rgba(0,229,255,.06),0 0 80px rgba(0,229,255,.1),0 40px 80px rgba(0,0,0,.9),inset 0 0 60px rgba(0,229,255,.02);
      animation:wrapIn .7s cubic-bezier(.22,1,.36,1);
    }
    @keyframes wrapIn{from{opacity:0;transform:translateY(30px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}

    /* ── Music Bar ── */
    .music-bar{
      display:none;align-items:center;justify-content:space-between;
      background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.15);
      border-radius:.9rem;padding:.6rem 1.2rem;margin-bottom:1.8rem;gap:.8rem;
      box-shadow:0 0 20px rgba(0,229,255,.05);
    }
    .music-info{display:flex;align-items:center;gap:.6rem;overflow:hidden;}
    .music-info i{color:var(--cyan);font-size:.85rem;flex-shrink:0;}
    .music-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#8ecfda;font-size:.78rem;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;}
    .music-eq{display:flex;align-items:flex-end;gap:2px;height:16px;flex-shrink:0;}
    .music-eq span{display:inline-block;width:3px;background:var(--cyan);border-radius:2px;animation:eq .8s ease-in-out infinite alternate;}
    .music-eq span:nth-child(1){height:6px;animation-delay:0s}
    .music-eq span:nth-child(2){height:12px;animation-delay:.15s}
    .music-eq span:nth-child(3){height:8px;animation-delay:.3s}
    .music-eq span:nth-child(4){height:14px;animation-delay:.1s}
    .music-eq span:nth-child(5){height:5px;animation-delay:.25s}
    .music-eq.paused span{animation-play-state:paused;opacity:.3}
    @keyframes eq{from{transform:scaleY(.3)}to{transform:scaleY(1)}}
    .music-toggle{
      background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.3);border-radius:.5rem;
      color:var(--cyan);padding:.35rem .8rem;cursor:pointer;transition:all .2s;flex-shrink:0;
      display:flex;align-items:center;gap:.4rem;
      font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:.8px;
    }
    .music-toggle:hover{background:rgba(0,229,255,.2);box-shadow:0 0 15px rgba(0,229,255,.35);}

    /* ── Header ── */
    .header{text-align:center;margin-bottom:2.5rem}
    .pic-wrap{display:flex;justify-content:center;margin-bottom:1.4rem}
    .pic-ring{
      width:115px;height:115px;border-radius:50%;border:3px solid var(--cyan);
      overflow:hidden;background:#001a20;display:flex;align-items:center;justify-content:center;
      position:relative;animation:rp 3.5s ease-in-out infinite;cursor:pointer;
    }
    @keyframes rp{
      0%,100%{box-shadow:0 0 0 5px rgba(0,229,255,.1),0 0 25px rgba(0,229,255,.5),0 0 60px rgba(0,180,200,.25)}
      50%{box-shadow:0 0 0 10px rgba(0,229,255,.06),0 0 50px rgba(0,229,255,.7),0 0 90px rgba(0,200,220,.45)}
    }
    .pic-ring img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .pic-ring .fi{font-size:2.8rem;color:var(--cyan);opacity:.65}
    h1{
      font-family:'Rajdhani',sans-serif;font-size:2.8rem;font-weight:700;
      letter-spacing:3px;text-transform:uppercase;
      background:linear-gradient(90deg,#00e5ff 0%,#39ff98 50%,#00bcd4 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      margin-bottom:.4rem;animation:titleGlow 4s ease-in-out infinite alternate;
    }
    @keyframes titleGlow{
      from{filter:drop-shadow(0 0 10px rgba(0,229,255,.5))}
      to{filter:drop-shadow(0 0 22px rgba(57,255,152,.6))}
    }
    .sub{color:var(--dim);font-size:.88rem;display:flex;align-items:center;justify-content:center;gap:.5rem;flex-wrap:wrap;}
    .sub i{color:var(--cyan);font-size:.7rem}
    .bdg{background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.22);border-radius:20px;padding:.22rem 1rem;font-size:.75rem;color:var(--cyan);}

    /* ── Cards ── */
    .grid{display:flex;flex-direction:column;gap:1.6rem;margin:1.8rem 0}
    .card{
      background:var(--card);border:1px solid var(--brd);border-radius:1.4rem;
      padding:1.7rem 1.8rem;box-shadow:0 8px 40px rgba(0,0,0,.6);
      transition:border-color .3s,box-shadow .3s,transform .3s;
      position:relative;overflow:hidden;
    }
    .card::before{
      content:"";position:absolute;top:0;left:-100%;width:60%;height:2px;
      background:linear-gradient(90deg,transparent,var(--cyan),transparent);
      opacity:0;
    }
    .card:hover{
      border-color:rgba(0,229,255,.5);
      box-shadow:0 0 40px rgba(0,229,255,.14),0 16px 50px rgba(0,180,200,.2);
      transform:translateY(-4px);
    }
    .card:hover::before{opacity:1;animation:shimmer 1.2s ease forwards}
    @keyframes shimmer{from{left:-60%}to{left:130%}}
    .card::after{
      content:"";position:absolute;top:12px;right:14px;width:8px;height:8px;border-radius:50%;
      background:var(--cyan);box-shadow:0 0 10px var(--cyan),0 0 20px var(--cyan);
      opacity:.5;animation:dot 2.5s ease-in-out infinite alternate;
    }
    @keyframes dot{from{opacity:.3;transform:scale(.7)}to{opacity:.9;transform:scale(1.3)}}

    .ch{display:flex;align-items:center;gap:.8rem;margin-bottom:1.3rem;flex-wrap:wrap;}
    .card-pic{
      width:48px;height:48px;border-radius:50%;border:2px solid var(--cyan);
      overflow:hidden;background:#001a20;display:flex;align-items:center;justify-content:center;
      flex-shrink:0;animation:rp 3.5s ease-in-out infinite;
    }
    .card-pic img{width:100%;height:100%;object-fit:cover;border-radius:50%}
    .card-pic .cfi{font-size:1.3rem;color:var(--cyan);opacity:.7}
    .ch h2{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.3rem;color:#e0f7fa;letter-spacing:1px;text-transform:uppercase;}
    .ep{background:rgba(0,229,255,.06);padding:.25rem .9rem;border-radius:20px;font-size:.7rem;color:var(--teal);margin-left:auto;font-family:monospace;border:1px solid rgba(0,229,255,.18);}

    /* ── Tabs ── */
    .method-tabs{display:flex;gap:.5rem;margin-bottom:1.1rem;flex-wrap:wrap;}
    .mtab{
      flex:1;min-width:80px;background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.18);
      border-radius:.6rem;padding:.5rem .8rem;color:var(--dim);font-size:.78rem;cursor:pointer;
      text-align:center;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:.5px;
      text-transform:uppercase;transition:all .2s;
    }
    .mtab:hover{background:rgba(0,229,255,.1);border-color:rgba(0,229,255,.4);color:var(--cyan);}
    .mtab.active{background:rgba(0,229,255,.15);border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 18px rgba(0,229,255,.25),inset 0 0 12px rgba(0,229,255,.07);}
    .method-fields{display:none}
    .method-fields.active{display:flex;flex-direction:column;gap:.7rem;margin-bottom:1rem}

    /* ── Inputs ── */
    input{
      width:100%;background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.14);
      border-radius:.65rem;padding:.8rem 1.1rem;font-size:.9rem;color:#c8f0f5;
      outline:none;font-family:'Inter',sans-serif;transition:all .25s;
    }
    input:focus{border-color:var(--cyan);box-shadow:0 0 20px rgba(0,229,255,.2),0 0 0 3px rgba(0,229,255,.06);background:rgba(0,229,255,.07);}
    input::placeholder{color:var(--dim);font-weight:300}

    /* ── Buttons ── */
    .btn-row{display:flex;flex-wrap:wrap;gap:.7rem;margin-top:.5rem}
    .btn{
      background:linear-gradient(135deg,#006978,#00bcd4);border:none;border-radius:.7rem;
      padding:.82rem 1.8rem;font-weight:700;color:#001a20;
      display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
      cursor:pointer;transition:all .25s;
      box-shadow:0 4px 20px rgba(0,180,200,.4),0 0 0 1px rgba(0,229,255,.12);
      font-family:'Rajdhani',sans-serif;font-size:.95rem;letter-spacing:.8px;text-transform:uppercase;
      position:relative;overflow:hidden;
    }
    .btn::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18),transparent);opacity:0;transition:opacity .2s;}
    .btn:hover::before{opacity:1}
    .btn:hover{background:linear-gradient(135deg,#00bcd4,#39ff98);box-shadow:0 6px 28px rgba(0,229,255,.6),0 0 0 1px rgba(57,255,152,.3);transform:translateY(-2px) scale(1.02);color:#001520;}
    .btn:active{transform:scale(.96)}

    /* ── VIP Status Box ── */
    .vip-status{
      display:none;margin-top:1.2rem;border-radius:1rem;overflow:hidden;
      animation:statusIn .4s cubic-bezier(.22,1,.36,1);
    }
    @keyframes statusIn{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
    .vip-bar{
      padding:.7rem 1.3rem;display:flex;align-items:center;gap:.7rem;
      font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.9rem;letter-spacing:1.5px;
    }
    .vip-bar .vip-icon{font-size:1.2rem;flex-shrink:0;}
    .vip-bar .vip-title{flex:1;text-transform:uppercase;}
    .vip-bar .vip-spin{flex-shrink:0;}
    .vip-body{padding:1.1rem 1.3rem;border-top:1px solid rgba(255,255,255,.06);}
    .vip-msg{font-family:'Courier New',monospace;font-size:.83rem;line-height:1.7;word-break:break-all;white-space:pre-wrap;}

    /* Loading state */
    .vip-status.s-loading{border:1px solid rgba(0,229,255,.3);box-shadow:0 0 30px rgba(0,229,255,.12);}
    .vip-status.s-loading .vip-bar{background:linear-gradient(90deg,rgba(0,100,150,.7),rgba(0,60,90,.7));}
    .vip-status.s-loading .vip-icon,.vip-status.s-loading .vip-title{color:#00e5ff;}
    .vip-status.s-loading .vip-body{background:rgba(0,20,30,.8);}
    .vip-status.s-loading .vip-msg{color:#5ecfdf;}

    /* Success state */
    .vip-status.s-success{border:1px solid rgba(57,255,152,.35);box-shadow:0 0 35px rgba(57,255,152,.1);}
    .vip-status.s-success .vip-bar{background:linear-gradient(90deg,rgba(0,90,50,.8),rgba(0,55,30,.8));}
    .vip-status.s-success .vip-icon,.vip-status.s-success .vip-title{color:#39ff98;}
    .vip-status.s-success .vip-body{background:rgba(0,15,8,.85);}
    .vip-status.s-success .vip-msg{color:#39ff98;}

    /* Error state */
    .vip-status.s-error{border:1px solid rgba(255,94,122,.35);box-shadow:0 0 35px rgba(255,94,122,.1);}
    .vip-status.s-error .vip-bar{background:linear-gradient(90deg,rgba(130,0,35,.8),rgba(80,0,20,.8));}
    .vip-status.s-error .vip-icon,.vip-status.s-error .vip-title{color:#ff5e7a;}
    .vip-status.s-error .vip-body{background:rgba(20,0,5,.85);}
    .vip-status.s-error .vip-msg{color:#ff5e7a;}

    /* ── Friend List Table ── */
    .fl-wrap{display:none;margin-top:1.2rem;animation:statusIn .4s cubic-bezier(.22,1,.36,1);}
    .fl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;}
    .fl-title{color:var(--cyan);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1rem;letter-spacing:1.5px;display:flex;align-items:center;gap:.5rem;}
    .fl-count{font-size:.78rem;color:var(--dim);font-weight:400;}
    .fl-close{
      background:transparent;border:1px solid rgba(0,229,255,.2);border-radius:.45rem;
      color:var(--dim);padding:.25rem .8rem;cursor:pointer;font-size:.75rem;
      transition:all .2s;font-family:'Rajdhani',sans-serif;
    }
    .fl-close:hover{border-color:rgba(255,94,122,.4);color:#ff5e7a;}
    .fl-table-wrap{overflow-x:auto;border-radius:.9rem;border:1px solid rgba(0,229,255,.14);box-shadow:0 0 20px rgba(0,229,255,.05);}
    .fl-table{width:100%;border-collapse:collapse;font-size:.83rem;}
    .fl-table thead tr{background:rgba(0,229,255,.08);border-bottom:1px solid rgba(0,229,255,.18);}
    .fl-table th{padding:.65rem 1rem;color:var(--cyan);font-family:'Rajdhani',sans-serif;letter-spacing:1.2px;text-align:left;font-size:.8rem;}
    .fl-table tbody tr{border-bottom:1px solid rgba(0,229,255,.06);transition:background .2s;}
    .fl-table tbody tr:hover{background:rgba(0,229,255,.06);}
    .fl-table td{padding:.6rem 1rem;}
    .fl-num{color:var(--dim);font-size:.78rem;}
    .fl-uid{color:#8ecfda;font-family:monospace;}
    .fl-name{color:#e0f7fa;display:flex;align-items:center;gap:.4rem;}
    .fl-name i{color:var(--cyan);opacity:.5;font-size:.7rem;}
    .fl-empty{text-align:center;padding:2rem;color:var(--dim);font-size:.85rem;}
    .fl-empty i{font-size:2rem;display:block;margin-bottom:.6rem;opacity:.35;}

    /* Row slide-in animation */
    @keyframes rowIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
    .fl-table tbody tr{animation:rowIn .3s ease forwards;opacity:0;}

    /* ── Footer ── */
    hr{border:none;border-top:1px solid rgba(0,229,255,.08);margin:1.8rem 0 1rem}
    .foot{text-align:center;color:var(--dim);font-size:.82rem;display:flex;justify-content:center;align-items:center;gap:.5rem;flex-wrap:wrap;}
    .foot i{color:var(--cyan);font-size:.7rem}

    @media(max-width:600px){
      .wrap{padding:1.6rem 1rem}
      h1{font-size:2rem}
      .btn{padding:.72rem 1.2rem;font-size:.88rem}
    }
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(0,229,255,.25);border-radius:3px}
  </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>

<div class="wrap">

  <!-- Music Bar -->
  <div class="music-bar" id="musicBar">
    <div class="music-info">
      <i class="fas fa-music"></i>
      <div class="music-eq" id="musicEq">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <span class="music-title">♪ Now Playing</span>
    </div>
    <button class="music-toggle" id="musicToggle">
      <i class="fas fa-pause" id="musicIcon"></i>
      <span id="musicLabel">PAUSE</span>
    </button>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="pic-wrap">
      <div class="pic-ring">
        <i class="fas fa-user fi" id="fi"></i>
        <img id="pi" src="pic.jpg" alt="Ayan" style="display:none"
          onerror="this.style.display='none';document.getElementById('fi').style.display='block'">
      </div>
    </div>
    <h1>Ayan Token Hub</h1>
    <div class="sub">
      <i class="fas fa-bolt"></i> by Ayan
      <span class="bdg"><i class="fas fa-code"></i> ayan_offcial</span>
    </div>
  </div>

  <div class="grid">

    <!-- ── BIO CARD ── -->
    <div class="card">
      <div class="ch">
        <div class="card-pic">
          <i class="fas fa-align-left cfi" id="cfi1"></i>
          <img id="cpi1" src="pic1.jpeg" alt="" style="display:none"
            onerror="this.style.display='none';document.getElementById('cfi1').style.display='flex'">
        </div>
        <h2>Update Bio</h2>
        <span class="ep">bio endpoint</span>
      </div>
      <div class="method-tabs">
        <div class="mtab active" data-card="bio" data-method="guest">Guest UID</div>
        <div class="mtab" data-card="bio" data-method="jwt">JWT Token</div>
        <div class="mtab" data-card="bio" data-method="access">Access Token</div>
      </div>
      <div class="method-fields active" id="bio-guest">
        <input id="bio-uid" placeholder="Your UID">
        <input id="bio-pass" type="password" placeholder="Password">
      </div>
      <div class="method-fields" id="bio-jwt">
        <input id="bio-jwt-val" placeholder="JWT Token">
      </div>
      <div class="method-fields" id="bio-access">
        <input id="bio-access-val" placeholder="Access Token">
      </div>
      <input id="bio-text" placeholder="Enter new bio..." style="margin-bottom:.8rem">
      <div class="btn-row">
        <button class="btn" id="bioBtn"><i class="fas fa-edit"></i> Update Bio</button>
      </div>
      <div class="vip-status" id="bioStatus">
        <div class="vip-bar">
          <span class="vip-icon" id="bioIcon"></span>
          <span class="vip-title" id="bioTitle"></span>
          <span class="vip-spin" id="bioSpin" style="display:none"><i class="fas fa-circle-notch fa-spin" style="color:rgba(255,255,255,.5)"></i></span>
        </div>
        <div class="vip-body">
          <div class="vip-msg" id="bioMsg"></div>
        </div>
      </div>
    </div>

    <!-- ── FRIEND MANAGER CARD ── -->
    <div class="card">
      <div class="ch">
        <div class="card-pic">
          <i class="fas fa-user-friends cfi" id="cfi2"></i>
          <img id="cpi2" src="pic2.jpeg" alt="" style="display:none"
            onerror="this.style.display='none';document.getElementById('cfi2').style.display='flex'">
        </div>
        <h2>Friend Manager</h2>
        <span class="ep">friend endpoint</span>
      </div>
      <div class="method-tabs">
        <div class="mtab active" data-card="fr" data-method="guest">Guest UID</div>
        <div class="mtab" data-card="fr" data-method="jwt">JWT Token</div>
        <div class="mtab" data-card="fr" data-method="access">Access Token</div>
      </div>
      <div class="method-fields active" id="fr-guest">
        <input id="fr-uid" placeholder="Your UID">
        <input id="fr-pass" type="password" placeholder="Password">
      </div>
      <div class="method-fields" id="fr-jwt">
        <input id="fr-jwt-val" placeholder="JWT Token">
      </div>
      <div class="method-fields" id="fr-access">
        <input id="fr-access-val" placeholder="Access Token">
      </div>
      <input id="fr-pid" placeholder="Target Friend UID" style="margin-bottom:.8rem">
      <div class="btn-row">
        <button class="btn" id="addBtn"><i class="fas fa-user-plus"></i> Add</button>
        <button class="btn" id="remBtn" style="background:linear-gradient(135deg,#7a0030,#d40055);box-shadow:0 4px 20px rgba(200,0,80,.45)">
          <i class="fas fa-user-minus"></i> Remove
        </button>
        <button class="btn" id="listBtn" style="background:linear-gradient(135deg,#00456b,#0090b0);box-shadow:0 4px 20px rgba(0,144,176,.45)">
          <i class="fas fa-list-ul"></i> Friend List
        </button>
      </div>
      <div class="vip-status" id="frStatus">
        <div class="vip-bar">
          <span class="vip-icon" id="frIcon"></span>
          <span class="vip-title" id="frTitle"></span>
          <span class="vip-spin" id="frSpin" style="display:none"><i class="fas fa-circle-notch fa-spin" style="color:rgba(255,255,255,.5)"></i></span>
        </div>
        <div class="vip-body">
          <div class="vip-msg" id="frMsg"></div>
        </div>
      </div>
      <!-- Friend List Table -->
      <div class="fl-wrap" id="flWrap">
        <div class="fl-header">
          <div class="fl-title">
            <i class="fas fa-users"></i> FRIEND LIST
            <span class="fl-count" id="flCount"></span>
          </div>
          <button class="fl-close" onclick="document.getElementById('flWrap').style.display='none'">✕ Close</button>
        </div>
        <div class="fl-table-wrap">
          <table class="fl-table">
            <thead>
              <tr>
                <th>#</th><th>UID</th><th>NAME</th>
              </tr>
            </thead>
            <tbody id="flBody"></tbody>
          </table>
        </div>
        <div class="fl-empty" id="flEmpty" style="display:none">
          <i class="fas fa-user-slash"></i> No friends found
        </div>
      </div>
    </div>

    <!-- ── USER INFO CARD ── -->
    <div class="card">
      <div class="ch">
        <div class="card-pic">
          <i class="fas fa-info-circle cfi" id="cfi3"></i>
          <img id="cpi3" src="pic3.jpeg" alt="" style="display:none"
            onerror="this.style.display='none';document.getElementById('cfi3').style.display='flex'">
        </div>
        <h2>User Info</h2>
        <span class="ep">info endpoint</span>
      </div>
      <input id="iUid" placeholder="Enter UID (e.g. 7468694883)" style="margin-bottom:.8rem">
      <div class="btn-row">
        <button class="btn" id="infoBtn"><i class="fas fa-search"></i> Fetch Info</button>
      </div>
      <div class="vip-status" id="infoStatus">
        <div class="vip-bar">
          <span class="vip-icon" id="infoIcon"></span>
          <span class="vip-title" id="infoTitle"></span>
          <span class="vip-spin" id="infoSpin" style="display:none"><i class="fas fa-circle-notch fa-spin" style="color:rgba(255,255,255,.5)"></i></span>
        </div>
        <div class="vip-body">
          <div class="vip-msg" id="infoMsg"></div>
        </div>
      </div>
    </div>

  </div>

  <hr>
  <div class="foot">
    <i class="fas fa-bolt"></i> Crafted by Ayan <i class="fas fa-bolt"></i>
    <span style="opacity:.45;margin-left:.3rem">ayan_offcial</span>
  </div>
</div>

<script>
(function(){

  /* ── Profile pic ── */
  var pi = document.getElementById("pi");
  pi.onload = function(){ pi.style.display="block"; document.getElementById("fi").style.display="none"; };

  /* ── Card pics ── */
  [1,2,3].forEach(function(n){
    var img = document.getElementById("cpi"+n);
    img.onload = function(){
      img.style.display="block";
      document.getElementById("cfi"+n).style.display="none";
    };
  });

  /* ── Music ── */
  var audio = document.getElementById("bgMusic");
  var musicPlaying = false;
  document.getElementById("musicBar").style.display = "flex";

  function updateMusicUI(){
    document.getElementById("musicIcon").className = musicPlaying ? "fas fa-pause" : "fas fa-play";
    document.getElementById("musicLabel").textContent = musicPlaying ? "PAUSE" : "PLAY";
    var eq = document.getElementById("musicEq");
    musicPlaying ? eq.classList.remove("paused") : eq.classList.add("paused");
  }
  function doPlay(){
    audio.play().then(function(){ musicPlaying=true; updateMusicUI(); }).catch(function(){});
  }
  doPlay();
  var interacted = false;
  function onInteract(){
    if(!interacted && !musicPlaying){ interacted=true; doPlay(); }
  }
  document.addEventListener("click", onInteract);
  document.addEventListener("touchstart", onInteract);
  document.getElementById("musicToggle").addEventListener("click", function(e){
    e.stopPropagation(); e.preventDefault();
    if(musicPlaying){ audio.pause(); musicPlaying=false; updateMusicUI(); }
    else { doPlay(); }
  });

  /* ── API URLs ── */
  var MAFU = "https://mafuuu-token-converter.onrender.com/mafu";
  var ADD  = "https://mahir-friend-web.vercel.app";
  var INFO = "https://mafuuuu-info-api.vercel.app/mafu-info";

  /* ── Helpers ── */
  function g(id){ return document.getElementById(id).value.trim(); }

  /* ── Universal VIP Status Box ── */
  function showStatus(prefix, type, msg){
    var box   = document.getElementById(prefix+"Status");
    var icon  = document.getElementById(prefix+"Icon");
    var title = document.getElementById(prefix+"Title");
    var spin  = document.getElementById(prefix+"Spin");
    var msgEl = document.getElementById(prefix+"Msg");

    // Reset classes
    box.className = "vip-status";
    box.style.display = "block";

    if(type === "loading"){
      box.classList.add("s-loading");
      icon.innerHTML  = '<i class="fas fa-satellite-dish"></i>';
      title.textContent = "PROCESSING";
      spin.style.display = "inline";
    } else if(type === "success"){
      box.classList.add("s-success");
      icon.innerHTML  = '<i class="fas fa-check-circle"></i>';
      title.textContent = "SUCCESS";
      spin.style.display = "none";
    } else {
      box.classList.add("s-error");
      icon.innerHTML  = '<i class="fas fa-times-circle"></i>';
      title.textContent = "FAILED";
      spin.style.display = "none";
    }
    msgEl.textContent = msg;
  }

  /* ── Generic API call with proxy ── */
  async function apiCall(url, prefix){
    showStatus(prefix, "loading", "Sending request to server...");
    try{
      var r = await fetch("/api/proxy?url=" + encodeURIComponent(url));
      var t = await r.text();
      var ok = r.status === 200 ||
               t.toLowerCase().includes("success") ||
               t.toLowerCase().includes("done") ||
               t.toLowerCase().includes("added") ||
               t.toLowerCase().includes("removed");
      showStatus(prefix, ok ? "success" : "error", "[" + r.status + "] " + t);
    } catch(e){
      showStatus(prefix, "error", "Network Error: " + e.message);
    }
  }

  /* ── Tab switching ── */
  document.querySelectorAll(".mtab").forEach(function(tab){
    tab.addEventListener("click", function(){
      var card = this.dataset.card, method = this.dataset.method;
      document.querySelectorAll('.mtab[data-card="'+card+'"]').forEach(function(t){ t.classList.remove("active"); });
      document.querySelectorAll('[id^="'+card+'-"]').forEach(function(f){
        if(f.classList.contains("method-fields")) f.classList.remove("active");
      });
      this.classList.add("active");
      document.getElementById(card+"-"+method).classList.add("active");
    });
  });

  /* ── Auth builder ── */
  function authParams(card){
    var method = document.querySelector('.mtab.active[data-card="'+card+'"]').dataset.method;
    if(method === "guest"){
      var uid = g(card+"-uid"), pass = g(card+"-pass");
      if(!uid || !pass) return null;
      return "uid=" + encodeURIComponent(uid) + "&password=" + encodeURIComponent(pass);
    } else if(method === "jwt"){
      var jwt = g(card+"-jwt-val");
      if(!jwt) return null;
      return "jwt_token=" + encodeURIComponent(jwt);
    } else {
      var acc = g(card+"-access-val");
      if(!acc) return null;
      return "access_token=" + encodeURIComponent(acc);
    }
  }

  /* ── BIO ── */
  document.getElementById("bioBtn").onclick = function(){
    var bio = g("bio-text");
    if(!bio){ showStatus("bio","error","Bio text is required!"); return; }
    var auth = authParams("bio");
    if(!auth){ showStatus("bio","error","UID and Password are required!"); return; }
    apiCall(MAFU + "?bio=" + encodeURIComponent(bio) + "&" + auth, "bio");
  };

  /* ── ADD FRIEND ── */
  document.getElementById("addBtn").onclick = function(){
    var pid = g("fr-pid");
    if(!pid){ showStatus("fr","error","Target Friend UID is required!"); return; }
    var uid = g("fr-uid"), pass = g("fr-pass");
    if(!uid || !pass){ showStatus("fr","error","Your UID and Password are required!"); return; }
    document.getElementById("flWrap").style.display = "none";
    apiCall(ADD + "/add_friend?uid=" + encodeURIComponent(uid) + "&password=" + encodeURIComponent(pass) + "&friend_uid=" + encodeURIComponent(pid), "fr");
  };

  /* ── REMOVE FRIEND ── */
  document.getElementById("remBtn").onclick = function(){
    var pid = g("fr-pid");
    if(!pid){ showStatus("fr","error","Target Friend UID is required!"); return; }
    var uid = g("fr-uid"), pass = g("fr-pass");
    if(!uid || !pass){ showStatus("fr","error","Your UID and Password are required!"); return; }
    document.getElementById("flWrap").style.display = "none";
    apiCall(ADD + "/remove_friend?uid=" + encodeURIComponent(uid) + "&password=" + encodeURIComponent(pass) + "&friend_uid=" + encodeURIComponent(pid), "fr");
  };

  /* ── FRIEND LIST ── */
  document.getElementById("listBtn").onclick = function(){
    var uid = g("fr-uid"), pass = g("fr-pass");
    if(!uid || !pass){ showStatus("fr","error","Your UID and Password are required!"); return; }
    document.getElementById("frStatus").style.display = "none";
    var wrap  = document.getElementById("flWrap");
    var body  = document.getElementById("flBody");
    var empty = document.getElementById("flEmpty");
    var count = document.getElementById("flCount");
    wrap.style.display = "block";
    empty.style.display = "none";
    body.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:1.5rem;color:var(--cyan)"><i class="fas fa-circle-notch fa-spin"></i> Loading...</td></tr>';

    fetch("/api/proxy?url=" + encodeURIComponent(
      ADD + "/friend_list?uid=" + encodeURIComponent(uid) + "&password=" + encodeURIComponent(pass) + "&friend_uid=" + encodeURIComponent(uid)
    ))
    .then(function(r){ return r.text(); })
    .then(function(t){
      try{
        var data = JSON.parse(t);
        var list = Array.isArray(data) ? data :
                   (data.friends || data.friend_list || data.data || []);
        if(!list.length){
          body.innerHTML = "";
          empty.style.display = "block";
          count.textContent = "(0)";
          return;
        }
        count.textContent = "— " + list.length + " friends";
        body.innerHTML = list.map(function(f, i){
          var u = f.uid || f.account_id || f.id || "-";
          var n = f.name || f.nickname || f.playerName || f.BasicInfo && f.BasicInfo.Nickname || "-";
          var delay = (i * 40) + "ms";
          return '<tr style="animation-delay:'+delay+'">'
            +'<td class="fl-num">'+(i+1)+'</td>'
            +'<td class="fl-uid">'+u+'</td>'
            +'<td class="fl-name"><i class="fas fa-user"></i>'+n+'</td>'
            +'</tr>';
        }).join("");
      } catch(e){
        body.innerHTML = '<tr><td colspan="3" style="padding:1rem;color:#ff5e7a;text-align:center;font-family:monospace;font-size:.8rem">Parse Error: '+t.substring(0,150)+'</td></tr>';
      }
    })
    .catch(function(e){
      body.innerHTML = '<tr><td colspan="3" style="padding:1rem;color:#ff5e7a;text-align:center">Network Error: '+e.message+'</td></tr>';
    });
  };

  /* ── USER INFO ── */
  document.getElementById("infoBtn").onclick = function(){
    var uid = g("iUid");
    if(!uid){ showStatus("info","error","Please enter a UID!"); return; }
    apiCall(INFO + "?uid=" + encodeURIComponent(uid), "info");
  };

})();
</script>
</body>
</html>
